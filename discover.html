<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover — NEU</title>
  <meta name="description"
    content="Browse open-source products and projects tested for neuroscience applications. Filter by hierarchical categories and technical specifications.">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ====== Navigation ====== -->
  <nav class="nav" id="main-nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo" id="nav-logo">
        <svg class="nav__logo-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="1.5" />
          <path d="M10 16 Q13 10, 16 16 Q19 22, 22 16" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" />
          <circle cx="10" cy="16" r="2" fill="currentColor" />
          <circle cx="22" cy="16" r="2" fill="currentColor" />
          <circle cx="16" cy="16" r="2" fill="currentColor" />
        </svg>
        NEU
      </a>

      <button class="nav__toggle" id="nav-toggle" aria-label="Toggle navigation">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>

      <div class="nav__links" id="nav-links">
        <a href="index.html" class="nav__link" id="nav-home">Home</a>
        <a href="learn.html" class="nav__link" id="nav-learn">Learn</a>
        <a href="discover.html" class="nav__link nav__link--active" id="nav-discover">Discover</a>
        <a href="contribute.html" class="nav__link" id="nav-contribute">Contribute</a>
        <a href="https://github.com/SainsburyWellcomeCentre/NEU/discussions" class="nav__link" id="nav-discussions"
          target="_blank" rel="noopener noreferrer">Discuss</a>
      </div>
    </div>
  </nav>

  <!-- ====== Page Header ====== -->
  <header class="hero" id="discover-hero" style="padding:var(--space-3xl) var(--space-xl)">
    <div class="hero__inner">
      <span class="hero__badge">Catalogue</span>
      <h1 class="hero__title" style="font-size:var(--fs-3xl)">Discover Projects</h1>
      <p class="hero__subtitle" style="margin-bottom:0">
        Browse tools and products that have been tested and validated for neuroscience applications.
      </p>
    </div>
  </header>

  <!-- ====== Catalogue ====== -->
  <section class="section" id="catalogue">
    <div class="section__inner">

      <div class="discover-layout" id="discover-layout">

        <!-- Sidebar -->
        <aside class="discover-sidebar" id="discover-sidebar">
          <div class="sidebar__header">
            <span>Categories</span>
            <button class="sidebar__clear" id="sidebar-clear" hidden>Clear all</button>
          </div>
          <div class="cat-tree" id="cat-tree">
            <!-- Built dynamically by script.js -->
          </div>
        </aside>

        <!-- Main content -->
        <div class="discover-main" id="discover-main">

          <!-- Mobile sidebar toggle -->
          <button class="sidebar-toggle" id="sidebar-toggle">
            <svg viewBox="0 0 24 24">
              <line x1="4" y1="6" x2="20" y2="6" />
              <line x1="4" y1="12" x2="14" y2="12" />
              <line x1="4" y1="18" x2="18" y2="18" />
            </svg>
            Filters
          </button>

          <!-- Search bar -->
          <div class="discover-toolbar" id="discover-toolbar">
            <input type="text" class="discover-search" id="discover-search"
              placeholder="Search by name, description, tag, or specification…" aria-label="Search projects">
            <span class="discover-count" id="discover-count"></span>
          </div>

          <!-- Active filter chips -->
          <div class="active-filters" id="active-filters"></div>

          <!-- Grid (populated by script.js) -->
          <div class="project-grid" id="project-grid"></div>

        </div>
      </div>

    </div>
  </section>

  <!-- ====== Footer ====== -->
  <footer class="footer" id="footer">
    <div class="footer__inner">
      <p class="footer__text">&copy; 2026 Neuroscience Engineering Universe. All rights reserved.</p>
      <div class="footer__links">
        <a href="https://github.com/SainsburyWellcomeCentre/NEU" class="footer__link" id="footer-github" target="_blank"
          rel="noopener noreferrer">GitHub</a>
        <a href="contribute.html" class="footer__link" id="footer-contribute">Contribute</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
