<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover — NEU</title>
  <meta name="description"
    content="Browse open-source products and projects tested for neuroscience applications. Filter by hierarchical categories and technical specifications.">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ====== Navigation ====== -->
  <neu-nav active-page="discover" base-path="."></neu-nav>

  <!-- ====== Page Header ====== -->
  <header class="hero hero--compact" id="discover-hero">
    <div class="hero__inner">
      <span class="hero__badge">Catalogue</span>
      <h1 class="hero__title hero__title--sm">Discover Projects</h1>
      <p class="hero__subtitle hero__subtitle--flush">
        Browse tools and products that have been tested and validated for neuroscience applications.
      </p>
    </div>
  </header>

  <!-- ====== Catalogue ====== -->
  <section class="section" id="catalogue">
    <div class="section__inner">

      <div class="discover-layout" id="discover-layout">

        <!-- Sidebar -->
        <aside class="discover-sidebar" id="discover-sidebar">
          <div class="sidebar__header">
            <span>Categories</span>
            <button class="sidebar__clear" id="sidebar-clear" hidden>Clear all</button>
          </div>
          <div class="cat-tree" id="cat-tree">
            <!-- Built dynamically by script.js -->
          </div>
        </aside>

        <!-- Main content -->
        <div class="discover-main" id="discover-main">

          <!-- Mobile sidebar toggle -->
          <button class="sidebar-toggle" id="sidebar-toggle">
            <svg viewBox="0 0 24 24">
              <line x1="4" y1="6" x2="20" y2="6" />
              <line x1="4" y1="12" x2="14" y2="12" />
              <line x1="4" y1="18" x2="18" y2="18" />
            </svg>
            Filters
          </button>

          <!-- Search bar -->
          <div class="discover-toolbar" id="discover-toolbar">
            <input type="text" class="discover-search" id="discover-search"
              placeholder="Search by name, description, tag, or specification…" aria-label="Search projects">
            <span class="discover-count" id="discover-count"></span>
          </div>

          <!-- Active filter chips -->
          <div class="active-filters" id="active-filters"></div>

          <!-- Grid (populated by script.js) -->
          <div class="project-grid" id="project-grid"></div>

        </div>
      </div>

    </div>
  </section>

  <!-- ====== Footer ====== -->
  <neu-footer base-path="."></neu-footer>

  <script src="scripts/components.js"></script>
  <script src="scripts/global.js"></script>
  <script src="scripts/discover.js"></script>
</body>

</html>
